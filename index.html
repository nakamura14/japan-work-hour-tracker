      const weekdayLabels = {
        zh: ["周一", "周二", "周三", "周四", "周五", "周六", "周日"],
        en: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
        ja: ["月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日", "日曜日"],
        vi: ["Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy", "Chủ Nhật"],
      };

      const createInitialRows = () =>
        Array.from({ length: 7 }, (_, index) => ({
          dayIndex: index,
          startHour: "",
          startMinute: "",
          endHour: "",
          endMinute: "",
          breakMinutes: 0,
          hourlyWage: 1113,
        }));

      const formatCurrency = (value) =>
        new Intl.NumberFormat("ja-JP", {
          style: "currency",
          currency: "JPY",
          maximumFractionDigits: 0,
        }).format(value);

      const formatHours = (value, unit) => `${value.toFixed(2)} ${unit}`;

      const toMinutes = (hourText, minuteText) => {
        if (hourText === "" || minuteText === "") return null;
        return Number(hourText) * 60 + Number(minuteText);
      };

      const calculateRowSummary = (row) => {
        const startMinutes = toMinutes(row.startHour, row.startMinute);
        const endMinutes = toMinutes(row.endHour, row.endMinute);
        const breakMinutes = Number(row.breakMinutes) || 0;
        const hourlyWage = Number(row.hourlyWage) || 0;

        if (
          startMinutes === null ||
          endMinutes === null ||
          breakMinutes < 0 ||
          hourlyWage < 0
        ) {
          return {
            workedHours: 0,
            lateNightHours: 0,
            dailyIncome: 0,
          };
        }

        let totalMinutes = endMinutes - startMinutes;
        if (totalMinutes <= 0) {
          totalMinutes += 24 * 60;
        }

        const payableMinutes = Math.max(totalMinutes - breakMinutes, 0);
        const workedHours = payableMinutes / 60;

        let lateNightMinutes = 0;
        for (let cursor = 0; cursor < payableMinutes; cursor += 1) {
          const absoluteMinute = (startMinutes + cursor) % (24 * 60);
          if (absoluteMinute >= 22 * 60 || absoluteMinute < 5 * 60) {
            lateNightMinutes += 1;
          }
        }

        const lateNightHours = lateNightMinutes / 60;
        const regularHours = Math.max(workedHours - lateNightHours, 0);
        const dailyIncome =
          regularHours * hourlyWage + lateNightHours * hourlyWage * 1.25;

        return {
          workedHours,
          lateNightHours,
          dailyIncome,
        };
      };

      const getStatusMeta = (weeklyHours, t) => {
        if (weeklyHours < 20) {
          return {
            label: t.safe,
            hint: t.safeHint,
            icon: "✓",
            className:
              "border-emerald-200 bg-emerald-50 text-emerald-700 shadow-emerald-100",
          };
        }

        if (weeklyHours < 25) {
          return {
            label: t.normal,
            hint: t.normalHint,
            icon: "◔",
            className:
              "border-sky-200 bg-sky-50 text-sky-700 shadow-sky-100",
          };
        }

        if (weeklyHours <= 28) {
          return {
            label: t.warning,
            hint: t.warningHint,
            icon: "!",
            className:
              "border-amber-200 bg-amber-50 text-amber-700 shadow-amber-100",
          };
        }

        return {
          label: t.danger,
          hint: t.dangerHint,
          icon: "!!",
          className:
            "border-rose-200 bg-rose-50 text-rose-700 shadow-rose-100",
        };
      };

      function TimeSelectorGroup({
        label,
        hourValue,
        minuteValue,
        onHourChange,
        onMinuteChange,
        t,

              <select
                value={hourValue}
                onChange={onHourChange}
                className="w-full min-w-[92px] appearance-none rounded-2xl border-2 border-slate-300 bg-white px-4 py-4 text-center text-lg font-black tabular-nums text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
              >
                <option value="">{t.hourPlaceholder}</option>
                {hourOptions.map((hour) => (
                  <option key={hour} value={hour}>
                    {hour}
                  </option>
                ))}
              </select>

              <span className="text-center text-xl font-black text-slate-400">:</span>

              <select
                value={minuteValue}
                onChange={onMinuteChange}
                className="w-full min-w-[92px] appearance-none rounded-2xl border-2 border-slate-300 bg-white px-4 py-4 text-center text-lg font-black tabular-nums text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
              >
                <option value="">{t.minutePlaceholder}</option>
                {minuteOptions.map((minute) => (
                  <option key={minute} value={minute}>
                    {minute}
                  </option>
                ))}
              </select>
            </div>
          </div>
        );
      }

      function WorkHourSchedulerDashboard() {
        const [rows, setRows] = useState(createInitialRows);
        const [language, setLanguage] = useState("zh");

        const t = translations[language];
        const weekdays = weekdayLabels[language];

        const updateRow = (index, field, value) => {
          setRows((currentRows) =>
            currentRows.map((row, rowIndex) =>
              rowIndex === index ? { ...row, [field]: value } : row
            )
          );
        };

        const clearAll = () => {
          setRows(createInitialRows());
        };

        const calculatedRows = useMemo(
          () =>
            rows.map((row) => ({
              ...row,
              dayLabel: weekdays[row.dayIndex],
              ...calculateRowSummary(row),
            })),
          [rows, weekdays]
        );

        const weeklySummary = useMemo(() => {
          const weeklyHours = calculatedRows.reduce(
            (total, row) => total + row.workedHours,
            0
          );
          const weeklyIncome = calculatedRows.reduce(
            (total, row) => total + row.dailyIncome,
            0
          );
          const monthlyEstimate = weeklyIncome * 4;
          const tax = monthlyEstimate > 88000 ? monthlyEstimate * 0.05 : 0;
          const monthlyNet = monthlyEstimate - tax;

          return {
            weeklyHours,
            weeklyIncome,
            monthlyEstimate,
            tax,
            monthlyNet,
          };
        }, [calculatedRows]);

        const statusMeta = getStatusMeta(weeklySummary.weeklyHours, t);

        return (
          <main className="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.18),_transparent_25%),linear-gradient(135deg,_#f8fafc_0%,_#eef2ff_45%,_#fefce8_100%)] px-4 py-8 text-slate-900">

              <section className="overflow-hidden rounded-[2rem] border border-white/70 bg-white/85 shadow-2xl shadow-slate-300/30 backdrop-blur">

                      <p className="text-sm font-extrabold uppercase tracking-[0.35em] text-sky-600">
                        {t.plannerTag}
                      </p>
                      <h1 className="mt-3 text-3xl font-black tracking-tight md:text-5xl">
                        {t.title}
                      </h1>
                      <p className="mt-4 text-sm leading-7 text-slate-600 md:text-base">

                      </p>
                    </div>

                    <div className="grid gap-3 xl:min-w-[280px] xl:max-w-[320px]">
                      <section
                        className={`rounded-[1.25rem] border p-4 shadow-lg ${statusMeta.className}`}
                      >
                        <div className="flex items-center gap-3">
                          <div className="grid h-10 w-10 place-items-center rounded-xl bg-white/70 text-lg font-black">
                            {statusMeta.icon}
                          </div>
                          <div>
                            <p className="text-[10px] font-extrabold uppercase tracking-[0.28em]">
                              {t.statusTitle}
                            </p>
                            <h3 className="mt-1 text-lg font-black">
                              {statusMeta.label}
                            </h3>
                          </div>
                        </div>

                        <p className="mt-2 text-xs font-medium leading-5">
                          {statusMeta.hint}
                        </p>

                        <div className="mt-3 rounded-2xl bg-white/70 px-3 py-3">
                          <p className="text-[11px] font-bold text-slate-500">
                            {t.weeklyHours}
                          </p>
                          <p className="mt-1 text-2xl font-black tabular-nums text-slate-900">
                            {formatHours(weeklySummary.weeklyHours, t.hoursUnit)}
                          </p>
                        </div>
                      </section>

                      <section className="rounded-[1.25rem] border border-slate-200 bg-white p-4 shadow-lg shadow-slate-200/70">
                        <h3 className="text-lg font-black">{t.incomeTitle}</h3>

                        <div className="mt-3 space-y-2">
                          <div className="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2.5">
                            <span className="text-[11px] font-bold text-slate-500">
                              {t.weeklyIncome}
                            </span>
                            <span className="text-sm font-black tabular-nums text-slate-900">
                              {formatCurrency(weeklySummary.weeklyIncome)}
                            </span>
                          </div>

                          <div className="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2.5">
                            <span className="text-[11px] font-bold text-slate-500">
                              {t.monthlyGross}
                            </span>
                            <span className="text-sm font-black tabular-nums text-slate-900">
                              {formatCurrency(weeklySummary.monthlyEstimate)}
                            </span>
                          </div>

                          <div className="flex items-center justify-between rounded-xl bg-slate-900 px-3 py-3">
                            <span className="text-[11px] font-bold text-slate-300">
                              {t.monthlyNet}

                              {formatCurrency(weeklySummary.monthlyNet)}

                  <div className="mt-6 flex flex-wrap gap-3">
                    {["zh", "vi", "ja", "en"].map((lang) => (
                      <button

                <div className="px-6 py-6 md:px-10">

                        type="button"
                        onClick={clearAll}
                        className="rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm font-bold text-slate-700 transition hover:border-slate-400 hover:bg-slate-50"
                      >
                        {t.clearAll}
                      </button>
                    </div>

                    <div className="space-y-4">
                      {calculatedRows.map((row, index) => (
                        <article
                          key={row.dayIndex}
                          className="rounded-3xl border border-slate-200 bg-slate-50/80 p-4 shadow-sm"
                        >
                          <div className="grid gap-4 md:grid-cols-2 2xl:grid-cols-[150px_minmax(180px,1fr)_minmax(180px,1fr)_minmax(180px,1fr)_minmax(220px,1.15fr)_minmax(220px,0.95fr)] 2xl:items-end">
                            <div>
                              <p className="text-xs font-bold uppercase tracking-[0.25em] text-slate-400">
                                {t.day}
                              </p>
                              <p className="mt-2 text-xl font-black text-slate-900">
                                {row.dayLabel}
                              </p>
                            </div>

                            <div className="md:col-span-1 2xl:col-span-1">
                              <TimeSelectorGroup
                                label={t.startTime}
                                hourValue={row.startHour}
                                minuteValue={row.startMinute}
                                onHourChange={(event) =>
                                  updateRow(index, "startHour", event.target.value)
                                }
                                onMinuteChange={(event) =>
                                  updateRow(index, "startMinute", event.target.value)
                                }
                                t={t}
                              />
                            </div>

                            <div className="md:col-span-1 2xl:col-span-1">
                              <TimeSelectorGroup
                                label={t.endTime}
                                hourValue={row.endHour}
                                minuteValue={row.endMinute}
                                onHourChange={(event) =>
                                  updateRow(index, "endHour", event.target.value)
                                }
                                onMinuteChange={(event) =>
                                  updateRow(index, "endMinute", event.target.value)
                                }
                                t={t}
                              />
                            </div>

                            <label className="block">
                              <span className="mb-2 block text-sm font-bold text-slate-600">
                                {t.breakMinutes}
                              </span>
                              <input
                                type="number"
                                min="0"
                                step="15"
                                value={row.breakMinutes}
                                onChange={(event) =>
                                  updateRow(index, "breakMinutes", event.target.value)
                                }
                                className="w-full rounded-2xl border-2 border-slate-300 bg-white px-4 py-4 text-center text-lg font-black tabular-nums text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
                              />
                            </label>

                            <label className="block">
                              <span className="mb-2 block text-sm font-bold text-slate-600">
                                {t.hourlyWage}
                              </span>
                              <input
                                type="number"
                                min="0"
                                step="1"
                                value={row.hourlyWage}
                                onChange={(event) =>
                                  updateRow(index, "hourlyWage", event.target.value)
                                }
                                className="w-full min-w-[210px] rounded-2xl border-2 border-slate-400 bg-white px-6 py-5 text-center text-2xl font-black tracking-wide tabular-nums text-slate-900 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-100"
                              />
                            </label>

                            <div className="rounded-2xl bg-white px-5 py-5 md:col-span-2 2xl:col-span-1">
                              <p className="text-sm font-bold text-slate-500">
                                {t.dailySummary}
                              </p>
                              <p className="mt-2 text-2xl font-black tabular-nums text-slate-900">
                                {formatHours(row.workedHours, t.hoursUnit)}
                              </p>
                              <p className="mt-2 text-base font-bold tabular-nums text-slate-600">
                                {t.dailyPay} {formatCurrency(row.dailyIncome)}
                              </p>
                              <p className="mt-2 text-sm leading-6 text-slate-400">
                                {t.lateNight} {row.lateNightHours.toFixed(2)} {t.hoursUnit}
                              </p>
                            </div>
                          </div>
                        </article>
                      ))}
                    </div>
                  </section>

                </div>
              </section>
            </div>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <WorkHourSchedulerDashboard />
      );
    </script>
  </body>
</html>
